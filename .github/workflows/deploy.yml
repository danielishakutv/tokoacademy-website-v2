name: Build and deploy to server

on:
  # Deploy when code changes are pushed to GitHub
  push:
    branches: [master]
  # Deploy instantly when WordPress publishes/updates content. The WP plugin in
  # wordpress-plugin/ fires this on every publish, so no hourly polling is needed.
  repository_dispatch:
    types: [wordpress_update]
  # Once-a-day safety net (06:17 UTC) in case a WordPress webhook is ever missed.
  schedule:
    - cron: '17 6 * * *'
  # Manual "Run workflow" button in the Actions tab
  workflow_dispatch:

# Queue deploys instead of running two at once; never cancel a deploy mid-upload
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (fetches fresh WordPress content)
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      # Additive deploy: uploads/overwrites this site's files only.
      # NEVER add --delete here — public_html contains other sites that must not be touched.
      - name: Deploy out/ to server (additive rsync, no delete)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          upload() {
            rsync -avz \
              -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
              out/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          }
          # Retry up to 3 times so a one-off network/SSH blip self-heals
          # instead of failing the run (and emailing a false alarm).
          n=1
          until upload; do
            if [ "$n" -ge 3 ]; then
              echo "rsync failed after $n attempts" >&2
              exit 1
            fi
            echo "rsync attempt $n failed — retrying in 10s..."
            n=$((n + 1))
            sleep 10
          done
